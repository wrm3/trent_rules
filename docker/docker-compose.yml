# trent_rules - Docker Compose Configuration
# Unified MCP Server with PostgreSQL for RAG, Research, and Video Analysis

name: trent_rules

services:
  # Main MCP Server (RAG, Research, Install, Video Analysis)
  trent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trent_rules_docker
    ports:
      - "8082:8082"  # HTTP/SSE transport
    environment:
      # Server Configuration
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8082
      - MCP_TRANSPORT=sse  # Options: stdio, sse, streamable-http

      # PostgreSQL Configuration (for RAG)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-rag_knowledge}
      - POSTGRES_USER=${POSTGRES_USER:-trent}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-trent_secret}

      # OpenAI Configuration (for embeddings and research)
      - OPENAI_API_KEY=${OPENAI_API_KEY}

      # Anthropic Configuration (for vision analysis)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

      # Gemini Configuration (optional)
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}

      # MediaWiki Configuration (optional)
      - MEDIAWIKI_SERVER=${MEDIAWIKI_SERVER:-}
      - MEDIAWIKI_USERNAME=${MEDIAWIKI_USERNAME}
      - MEDIAWIKI_PASSWORD=${MEDIAWIKI_PASSWORD}
      - MEDIAWIKI_API_KEY=${MEDIAWIKI_API_KEY}

      # Service URLs (environment-aware — change per deployment)
      - PGADMIN_URL=${PGADMIN_URL:-http://localhost:8083}
      - TRENT_URL=${TRENT_URL:-http://localhost:8082}

      # GitHub Configuration (for install_trent tool)
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPO=${GITHUB_REPO:-wrm3/trent_rules}

      # Video Processing Configuration
      - VIDEO_CACHE_DIR=/app/cache
      - VIDEO_FRAMES_DIR=/app/frames
      - VIDEO_STATE_FILE=/app/data/video_state.json
      - FRAME_INTERVAL=${FRAME_INTERVAL:-30}
      - MAX_FRAMES=${MAX_FRAMES:-10}
      - PLAYLIST_LIMIT=${PLAYLIST_LIMIT:-50}
    volumes:
      # Persist data and logs
      - trent_rules_data:/app/data
      - trent_rules_logs:/app/logs
      - trent_rules_research:/app/research_output
      # Video analyzer storage
      - video_cache:/app/cache
      - video_frames:/app/frames
      # Mount Windows drives for install_trent to write to host filesystem
      - /g:/mnt/g
      - /p:/mnt/p
      - /m:/mnt/m
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/ || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - trent_rules_network

  # PostgreSQL Database (for RAG with pgvector)
  postgres:
    image: pgvector/pgvector:pg16
    container_name: trent_rules_postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-rag_knowledge}
      - POSTGRES_USER=${POSTGRES_USER:-trent}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-trent_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Initialization scripts
      - ./init_db:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"  # External access on 5433
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trent} -d ${POSTGRES_DB:-rag_knowledge}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - trent_rules_network

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: trent_rules_pgadmin
    profiles:
      - admin  # Only starts with: docker compose --profile admin up
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:?PGADMIN_EMAIL required}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:?PGADMIN_PASSWORD required}
    ports:
      - "8083:80"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - trent_rules_network

  # MediaWiki — private knowledge base (Postgres backend, no MySQL)
  mediawiki:
    build:
      context: ./mediawiki
      dockerfile: Dockerfile
    container_name: trent_rules_mediawiki
    profiles:
      - mediawiki  # Start with: docker compose --profile mediawiki up -d
    environment:
      # Identity
      - MEDIAWIKI_SITE_NAME=${MEDIAWIKI_SITE_NAME:-trent Knowledge Base}
      - MEDIAWIKI_SERVER=${MEDIAWIKI_SERVER:-http://localhost:8880}
      - MEDIAWIKI_PUBLIC=${MEDIAWIKI_PUBLIC:-false}
      # Admin account (created on first run)
      - MEDIAWIKI_ADMIN_USER=${MEDIAWIKI_ADMIN_USER:-WikiAdmin}
      - MEDIAWIKI_ADMIN_PASSWORD=${MEDIAWIKI_ADMIN_PASSWORD:?MEDIAWIKI_ADMIN_PASSWORD required}
      - MEDIAWIKI_ADMIN_EMAIL=${MEDIAWIKI_ADMIN_EMAIL:-admin@localhost}
      # Database (shared Postgres instance)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-trent}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-trent_secret}
      - MEDIAWIKI_DB_NAME=${MEDIAWIKI_DB_NAME:-mediawiki}
      - MEDIAWIKI_DB_PREFIX=${MEDIAWIKI_DB_PREFIX:-mw_}
      # Security keys — MUST be set in .env (generate: openssl rand -hex 32)
      - MEDIAWIKI_SECRET_KEY=${MEDIAWIKI_SECRET_KEY:?MEDIAWIKI_SECRET_KEY required}
      - MEDIAWIKI_UPGRADE_KEY=${MEDIAWIKI_UPGRADE_KEY:?MEDIAWIKI_UPGRADE_KEY required}
      # Bot credentials for MCP mediawiki_* tools
      - MEDIAWIKI_USERNAME=${MEDIAWIKI_USERNAME}
      - MEDIAWIKI_PASSWORD=${MEDIAWIKI_PASSWORD}
    ports:
      - "8880:80"
    volumes:
      - mediawiki_images:/var/www/html/images
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/wiki/Main_Page || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - trent_rules_network

  # Firecrawl Platform Docs Crawler (weekly cron, updates .platforms/ and RAG)
  firecrawl:
    build:
      context: ./firecrawl
      dockerfile: Dockerfile
    container_name: trent_firecrawl
    profiles:
      - platform-docs  # Start with: docker compose --profile platform-docs up -d
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-rag_knowledge}
      - POSTGRES_USER=${POSTGRES_USER:-trent}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-trent_secret}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
      - RAG_SUBJECT=platform_docs
      - CRAWL_SCHEDULE=${CRAWL_SCHEDULE:-0 2 * * 0}  # Sundays 2am UTC
      - GIT_AUTO_COMMIT=${GIT_AUTO_COMMIT:-false}     # Set true in CI only
    volumes:
      - platform_docs_data:/data/platforms
      - ${GIT_REPO_PATH:-.}:/repo:rw  # Mount repo root for git commits (optional)
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trent_rules_network

volumes:
  postgres_data:
    driver: local
  trent_rules_data:
    driver: local
  trent_rules_logs:
    driver: local
  trent_rules_research:
    driver: local
  video_cache:
    driver: local
  video_frames:
    driver: local
  platform_docs_data:
    driver: local
  mediawiki_images:
    driver: local

networks:
  trent_rules_network:
    driver: bridge
