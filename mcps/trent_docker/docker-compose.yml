# trent_docker - Docker Compose Configuration
# Unified MCP Server with PostgreSQL for RAG

services:
  # Main MCP Server
  trent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trent
    ports:
      - "8082:8082"  # HTTP/SSE transport
    environment:
      # Server Configuration
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8082
      - MCP_TRANSPORT=sse  # Options: stdio, sse, streamable-http

      # PostgreSQL Configuration (for RAG)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-rag_knowledge}
      - POSTGRES_USER=${POSTGRES_USER:-trent}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-trent_secret}

      # OpenAI Configuration (for embeddings and research)
      - OPENAI_API_KEY=${OPENAI_API_KEY}

      # Perplexity Configuration (for research - NO DuckDuckGo)
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}

      # Google Search Configuration (optional)
      - GOOGLE_SEARCH_API_KEY=${GOOGLE_SEARCH_API_KEY}
      - GOOGLE_SEARCH_ENGINE_ID=${GOOGLE_SEARCH_ENGINE_ID}

      # MediaWiki Configuration (optional)
      - MEDIAWIKI_URL=${MEDIAWIKI_URL}
      - MEDIAWIKI_USERNAME=${MEDIAWIKI_USERNAME}
      - MEDIAWIKI_PASSWORD=${MEDIAWIKI_PASSWORD}
      - MEDIAWIKI_API_KEY=${MEDIAWIKI_API_KEY}
    volumes:
      # Persist data and logs
      - trent_data:/app/data
      - trent_logs:/app/logs
      - trent_research:/app/research_output
      # Mount templates for installation
      - ./templates:/app/templates:ro
      # Mount Windows drives for install_trent to write to host filesystem
      - /g:/mnt/g
      - /p:/mnt/p
      - /m:/mnt/m
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/ || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - trent_network

  # PostgreSQL Database (for RAG with pgvector)
  postgres:
    image: pgvector/pgvector:pg16
    container_name: trent_postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-rag_knowledge}
      - POSTGRES_USER=${POSTGRES_USER:-trent}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-trent_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Initialization scripts
      - ./init_db:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"  # External access on 5433
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trent} -d ${POSTGRES_DB:-rag_knowledge}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - trent_network

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: trent_pgadmin
    profiles:
      - admin  # Only starts with: docker compose --profile admin up
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@trent.local}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-admin}
    ports:
      - "8083:80"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - trent_network

volumes:
  postgres_data:
    driver: local
  trent_data:
    driver: local
  trent_logs:
    driver: local
  trent_research:
    driver: local

networks:
  trent_network:
    driver: bridge
